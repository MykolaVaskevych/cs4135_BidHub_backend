server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins: "http://localhost:5173"
                allowed-methods: "*"
                allowed-headers: "*"
                allow-credentials: true
          routes:
            - id: account-service
              uri: lb://account-service
              predicates:
                - Path=/api/accounts/**,/api/auth/**,/api/admin/**
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/orders/**
            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/payments/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

bidhub:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-do-not-use-in-production}
  auth:
    open-paths:
      - /api/auth/**
      - /actuator/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
