server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins: "http://localhost:5173"
                allowed-methods: "*"
                allowed-headers: "*"
                allow-credentials: true
          routes:
            - id: admin-service
              uri: lb://admin-service
              predicates:
                - Path=/api/admin/categories/**,/api/admin/reports/**,/api/admin/moderation-actions/**,/api/admin/dashboard/**,/api/categories/**
            - id: auction-service
              uri: lb://auction-service
              predicates:
                - Path=/api/auctions/**
            - id: account-service
              uri: lb://account-service
              predicates:
                - Path=/api/accounts/**,/api/auth/**,/api/admin/users/**
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/orders/**
            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/payments/**
            - id: catalog-service
              uri: lb://catalog-service
              predicates:
                - Path=/api/catalogue/**
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/notifications/**
            - id: delivery-service
              uri: lb://delivery-service
              predicates:
                - Path=/api/delivery/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

bidhub:
  jwt:
    secret: ${JWT_SECRET}
  auth:
    open-paths:
      - /api/auth/**
      - /actuator/**
  internal:
    api-token: ${INTERNAL_API_TOKEN}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
