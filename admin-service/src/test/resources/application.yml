# Test-only overrides: disable config server import so @WebMvcTest doesn't require it running
spring:
  config:
    import: "optional:configserver:"
  datasource:
    url: jdbc:h2:mem:test_admin_db
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop

eureka:
  client:
    enabled: false
