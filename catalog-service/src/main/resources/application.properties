spring.application.name=catalog-service
server.port=8082

# H2 Database (Local Development)
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:catalog_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Actuator
management.endpoints.web.exposure.include=health,info
# Eureka Service Discovery
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
# Config Server
spring.config.import=optional:configserver:http://localhost:8888
# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.catalogueService.sliding-window-size=5
resilience4j.circuitbreaker.instances.catalogueService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.catalogueService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.catalogueService.permitted-number-of-calls-in-half-open-state=3