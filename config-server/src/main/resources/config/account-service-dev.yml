server:
  port: 8081

spring:
  datasource:
    url: jdbc:h2:mem:account_db
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

bidhub:
  jwt:
    expiration-ms: 3600000
    issuer: bidhub-account-service

logging:
  level:
    com.bidhub: DEBUG
