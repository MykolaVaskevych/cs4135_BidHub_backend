server:
  port: 8081

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bidhub_accounts}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:bidhub}
    password: ${DB_PASSWORD:bidhub_dev_password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

bidhub:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 3600000
    issuer: bidhub-account-service
  internal:
    api-token: ${INTERNAL_API_TOKEN:}

logging:
  level:
    com.bidhub: DEBUG
