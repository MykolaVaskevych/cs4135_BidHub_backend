name: Backend CI

on:
  pull_request:
    branches: [development, main]
  push:
    branches: [development, main]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bidhub
          POSTGRES_PASSWORD: bidhub_dev_password
          POSTGRES_DB: bidhub_accounts
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bidhub -d bidhub_accounts"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build Config Server
        run: ./mvnw -B -pl config-server -am package -DskipTests

      - name: Start Config Server
        run: |
          nohup java -Deureka.client.enabled=false \
            -jar config-server/target/config-server-0.0.1-SNAPSHOT.jar \
            > config-server.log 2>&1 &
          echo $! > config-server.pid

      - name: Wait for Config Server
        run: npx --yes wait-on@7 http://localhost:8888/actuator/health --timeout 60000

      - name: Build and run unit tests
        run: ./mvnw -B test

      - name: Build all services
        run: ./mvnw -B package -DskipTests

      - name: Start API Gateway
        run: |
          nohup java -jar api-gateway/target/api-gateway-0.0.1-SNAPSHOT.jar > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for API Gateway
        run: |
          npx --yes wait-on@7 http://localhost:8080/actuator/health --timeout 60000

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Run Bruno API tests
        working-directory: bruno
        run: bru run --env ci

      - name: Stop API Gateway
        if: always()
        run: |
          if [ -f app.pid ]; then kill $(cat app.pid) || true; fi

      - name: Stop Config Server
        if: always()
        run: |
          if [ -f config-server.pid ]; then kill $(cat config-server.pid) || true; fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-logs
          path: |
            app.log
            config-server.log
